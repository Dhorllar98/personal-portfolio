services:
  - type: web
    name: portfolio-api
    runtime: docker
    rootDir: backend
    dockerfilePath: backend/Dockerfile
    plan: starter
    region: oregon
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:10000
      - key: SUPABASE_CONNECTION_STRING
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
